<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MINES - VIP PRESTIGE</title>
    <style>
        :root {
            --gold: #ffd700;
            --electric-blue: #00d4ff;
            --bg-dark: #000c18;
            --vip-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0; font-family: sans-serif;
            background-color: var(--bg-dark); color: white; overflow-x: hidden;
            height: 100%;
        }

        /* --- الشاشات --- */
        .screen {
            display: none; min-height: 100vh; width: 100%; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }

        .active { display: flex !important; }

        #screen-landing {
            background: linear-gradient(rgba(0,12,24,0.85), rgba(0,12,24,0.85)), 
                        url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=1000');
            background-size: cover;
        }

        .main-title {
            font-size: 40px; color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            margin-bottom: 40px; font-weight: bold;
        }

        .btn-group { display: flex; flex-direction: column; gap: 20px; width: 90%; max-width: 320px; }

        .btn-trial {
            background: rgba(255,255,255,0.1); border: 2px solid white; color: white;
            padding: 15px; border-radius: 12px; font-size: 16px; cursor: pointer;
        }

        .btn-vip-gold {
            background: linear-gradient(145deg, #ffd700, #b8860b);
            border: 3px solid #fff; border-radius: 15px; padding: 15px;
            cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-vip-gold .text-box { color: #000; font-weight: bold; font-size: 18px; }

        .auth-box {
            background: rgba(0, 41, 75, 0.95); padding: 25px; border-radius: 20px;
            border: 2px solid var(--electric-blue); width: 85%; max-width: 300px;
        }

        input {
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px;
            border: 1px solid var(--electric-blue); background: #000; color: white;
            font-size: 18px; text-align: center; outline: none;
        }

        .submit-btn {
            background: var(--electric-blue); color: #000; border: none; padding: 12px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* --- اللعبة --- */
        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
            background: #0a4269; padding: 10px; border-radius: 12px; border: 2px solid var(--electric-blue);
        }

        .cell {
            width: 50px; height: 50px; background: #1a5a8a; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 22px; border: 1px solid var(--electric-blue);
        }

        .cell.gem { background: linear-gradient(135deg, var(--electric-blue), #005f73); }
        .cell.bomb { background: linear-gradient(135deg, #ff4d4d, #800000); }

        .controls { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
        .btn-control { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; flex: 1; min-width: 100px; }
    </style>
</head>
<body>

    <div id="screen-landing" class="screen active">
        <h1 class="main-title">GEMS MINES<br><span style="color:white; font-size: 20px;">VIP PRESTIGE</span></h1>
        <div class="btn-group">
            <button class="btn-trial" onclick="showScreen('screen-id')">تجربة مجانية لفترة محدودة</button>
            <div class="btn-vip-gold" onclick="showScreen('screen-id')">
                <span style="font-size: 30px;">🐉</span>
                <div class="text-box">VIP ACCESS</div>
            </div>
        </div>
    </div>

    <div id="screen-id" class="screen">
        <div class="auth-box">
            <h2 style="color:var(--electric-blue)">تأكيد الـ ID</h2>
            <input type="text" id="idInput" placeholder="أدخل الـ ID الخاص بك">
            <button class="submit-btn" onclick="checkID()">استمرار</button>
        </div>
    </div>

    <div id="screen-pass" class="screen">
        <div class="auth-box">
            <h2 style="color:var(--gold)">دخول آمن</h2>
            <input type="password" id="passInput" placeholder="Password">
            <button class="submit-btn" style="background:var(--gold)" onclick="checkPass()">دخول</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div style="color:var(--electric-blue); font-size: 24px; margin-bottom: 15px; font-weight: bold;">VIP PLATFORM</div>
        <div class="grid" id="grid"></div>
        <div style="margin: 15px 0; font-size: 18px;">
            💎: <span id="score">0</span> | 💣: <span id="bombs">0</span>
        </div>
        <div class="controls">
            <button class="btn-control" style="background: #ffc107; color: #000;" onclick="undoMove()">تراجع</button>
            <button class="btn-control" style="background: #dc3545;" onclick="resetCurrentRound()">إعادة</button>
            <button class="btn-control" style="background: #28a745; min-width: 210px;" onclick="startNewGame()">🆕 لعبة جديدة (2 قنبلة)</button>
        </div>
    </div>

    <script>
        // قائمة الـ IDs المسموحة
        const allowedIDs = ["user1", "admin", "15711", "10020025"];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
        }

        function checkID() {
            const val = document.getElementById('idInput').value.trim();
            if (allowedIDs.includes(val)) {
                showScreen('screen-pass');
            } else {
                alert("الـ ID غير مسجل!");
            }
        }

        function checkPass() {
            const val = document.getElementById('passInput').value;
            if (val === "15711") {
                showScreen('screen-game');
                startNewGame();
            } else {
                alert("الباسورد خطأ!");
            }
        }

        // منطق اللعبة
        let score = 0, bombsFound = 0, bombPositions = [], moveHistory = [];

        function startNewGame() {
