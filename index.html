<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MINES - VIP PRESTIGE</title>
    <style>
        :root {
            --gold: #ffd700;

        body, html {

        .screen {

            background-size: cover; background-position: center; transition: 0.5s;
        }

        .active { display: flex; }

        #screen-landing {
            background: linear-gradient(rgba(0,12,24,0.8), rgba(0,12,24,0.8)),

        }

        .btn-group { display: flex; flex-direction: column; gap: 25px; width: 85%; max-width: 350px; }

        .btn-trial {
            background: rgba(255,255,255,0.1); border: 2px solid white; color: white;
            padding: 15px; border-radius: 12px; font-size: 18px; cursor: pointer; transition: 0.3s;
        }

            display: flex; align-items: center; justify-content: center; gap: 15px;
        }

        .btn-vip-gold .text-box { color: #000; font-weight: bold; font-size: 20px; text-align: right; }

        }
