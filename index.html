<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💥 BATTLEZONE MOBILE: ABSOLUTE FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #090d16; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="relative flex items-center justify-center">

    <!-- شاشة البداية والاختيارات -->
    <div id="setup-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/95 p-4">
        <div class="bg-slate-900 border-2 border-red-500 rounded-2xl p-5 max-w-xs w-full text-center">
            <h2 class="text-lg font-black text-red-500 mb-3">BATTLEZONE MOBILE V4</h2>
            <input type="text" id="passwordInput" value="15711" class="w-full p-2 mb-3 rounded-lg bg-slate-800 text-center font-bold text-red-400 outline-none text-xs"/>
            <select id="map-select" class="w-full p-2 mb-3 rounded-lg bg-slate-800 font-bold text-xs text-amber-400 outline-none">
                <option value="hotel">🏨 الفندق الفاخر</option>
                <option value="building">🏢 المبنى السكني</option>
                <option value="arena">🏜️ الساحة المفتوحة</option>
            </select>
            <select id="diff-select" class="w-full p-2 mb-4 rounded-lg bg-slate-800 font-bold text-xs text-red-400 outline-none">
                <option value="medium">💀 مستوى متوسط</option>
                <option value="hard">☣️ مستوى محترف</option>
            </select>
            <button onclick="startBattle()" class="w-full bg-red-600 text-white p-2.5 rounded-lg font-black text-sm">ابدأ القتال فوراً 💥</button>
        </div>
    </div>

    <!-- الكانفاس الأساسي (كل شيء يرسم ويلمس هنا بكفاءة 100%) -->
    <canvas id="gameCanvas" class="hidden"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const weaponsConfig = {
            m4: { name: 'M4 الرشاش', speed: 12, damage: 10, fireRate: 150, color: '#fbbf24', size: 3, spread: false },
            shotgun: { name: 'شوتجن مدمر', speed: 9, damage: 25, fireRate: 600, color: '#f97316', size: 4, spread: true },
            sniper: { name: 'قناص بلاتيني', speed: 25, damage: 60, fireRate: 1100, color: '#06b6d4', size: 5, spread: false }
        };

        let player = { x: 100, y: 150, hp: 100, maxHp: 100, speed: 4, r: 14, color: '#3b82f6', weapon: 'm4', lastShot: 0, angle: 0 };
        let bots = []; let bullets = []; let particles = []; let walls = [];
        let botDifficulty = 'medium'; let isGameRunning = false;

        // إحداثيات وأحجام زراير الشاشة (ترسم داخل الكانفاس لتفادي مشاكل الأبعاد)
        let controls = {
            joy: { x: 0, y: 0, r: 55, knobX: 0, knobY: 0, knobR: 24, touchId: null, active: false },
            fire: { x: 0, y: 0, r: 45, active: false, touchId: null },
            weaponBtn: { x: 0, y: 0, w: 100, h: 35 } // زر تبديل السلاح العلوي
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // ضبط توازن أزرار التحكم هندسياً حسب حجم الشاشة الفعلي (طولي أو عرضي)
            controls.joy.x = 80;
            controls.joy.y = canvas.height - 80;
            controls.joy.knobX = controls.joy.x;
            controls.joy.knobY = controls.joy.y;

            controls.fire.x = canvas.width - 80;
            controls.fire.y = canvas.height - 80;

            controls.weaponBtn.x = canvas.width / 2 - 50;
            controls.weaponBtn.y = 15;

            if(isGameRunning) buildMapWalls(document.getElementById('map-select').value);
        }

        function startBattle() {
            if (document.getElementById('passwordInput').value.trim() !== '15711') return;
            botDifficulty = document.getElementById('diff-select').value;
            
            document.getElementById('setup-screen').classList.add('hidden');
            canvas.classList.remove('hidden');
            
            isGameRunning = true;
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            buildMapWalls(document.getElementById('map-select').value);
            spawnBots();
            setupDirectTouch();
            
            requestAnimationFrame(battleLoop);
        }

        function buildMapWalls(type) {
            walls = [
                { x: 0, y: 0, w: canvas.width, h: 10 }, { x: 0, y: canvas.height-10, w: canvas.width, h: 10 },
                { x: 0, y: 0, w: 10, h: canvas.height }, { x: canvas.width-10, y: 0, w: 10, h: canvas.height }
            ];
            if (type === 'building') {
                walls.push({ x: canvas.width*0.3, y: 10, w: 20, h: canvas.height*0.4 }, { x: canvas.width*0.6, y: canvas.height*0.5, w: 20, h: canvas.height*0.4 });
            } else {
                walls.push({ x: canvas.width*0.4, y: canvas.height*0.3, w: canvas.width*0.2, h: 30 });
            }
        }

        function spawnBots() {
            bots = [
                { x: canvas.width * 0.8, y: canvas.height * 0.3, hp: 80, maxHp: 80, color: '#ef4444', speed: botDifficulty === 'hard' ? 2.5 : 1.5, r: 13, lastShot: 0, vx: 1, vy: 1 },
                { x: canvas.width * 0.7, y: canvas.height * 0.7, hp: 80, maxHp: 80, color: '#ef4444', speed: botDifficulty === 'hard' ? 2.5 : 1.5, r: 13, lastShot: 0, vx: -1, vy: 1 }
            ];
        }

        // معالجة اللمس المباشر على الكانفاس بدون وساطة الـ HTML (كفاءة واستجابة فورية)
        function setupDirectTouch() {
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
        }

        function handleTouchStart(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const tx = t.clientX; const ty = t.clientY;

                // 1. لمس منطقة الـ Joystick
                let distJoy = Math.sqrt((tx - controls.joy.x)**2 + (ty - controls.joy.y)**2);
                if (distJoy < controls.joy.r + 20 && controls.joy.touchId === null) {
                    controls.joy.touchId = t.identifier;
                    controls.joy.active = true;
                    updateJoystickKnob(tx, ty);
                }

                // 2. لمس منطقة زر ضرب النار
                let distFire = Math.sqrt((tx - controls.fire.x)**2 + (ty - controls.fire.y)**2);
                if (distFire < controls.fire.r + 20 && controls.fire.touchId === null) {
                    controls.fire.touchId = t.identifier;
                    controls.fire.active = true;
                }

                // 3. لمس زر تبديل السلاح العلوي
                if (tx > controls.weaponBtn.x && tx < controls.weaponBtn.x + controls.weaponBtn.w &&
                    ty > controls.weaponBtn.y && ty < controls.weaponBtn.y + controls.weaponBtn.h) {
                    cycleWeapons();
                }
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];
                if (t.identifier === controls.joy.touchId) {
                    updateJoystickKnob(t.clientX, t.clientY);
                }
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === controls.joy.touchId) {
                    controls.joy.touchId = null;
                    controls.joy.active = false;
                    controls.joy.knobX = controls.joy.x;
                    controls.joy.knobY = controls.joy.y;
                }
                if (t.identifier === controls.fire.touchId) {
                    controls.fire.touchId = null;
                    controls.fire.active = false;
                }
            }
        }

        function updateJoystickKnob(tx, ty) {
            let dx = tx - controls.joy.x;
            let dy = ty - controls.joy.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            let maxDist = controls.joy.r - 15;

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }
            controls.joy.knobX = controls.joy.x + dx;
            controls.joy.knobY = controls.joy.y + dy;

            player.angle = Math.atan2(dy, dx);
        }

        function cycleWeapons() {
            const wkeys = Object.keys(weaponsConfig);
            let currIdx = wkeys.indexOf(player.weapon);
            let nextIdx = (currIdx + 1) % wkeys.length;
            player.weapon = wkeys[nextIdx];
        }

        function battleLoop() {
            if (!isGameRunning) return;
            updateGameLogic();
            renderGameGraphics();
            requestAnimationFrame(battleLoop);
        }

        function updateGameLogic() {
            // معالجة حركة اللاعب بناءً على سحب الجوستيك
            if (controls.joy.active) {
                let vx = (controls.joy.knobX - controls.joy.x) / (controls.joy.r - 15) * player.speed;
                let vy = (controls.joy.knobY - controls.joy.y) / (controls.joy.r - 15) * player.speed;
                moveEntity(player, vx, vy);
            }

            // نظام توجيه تلقائي (Auto-Aim) للمساعدة عند اقتراب العدو
            let closest = null; let minDist = 220;
            bots.forEach(b => {
                let d = Math.sqrt((b.x - player.x)**2 + (b.y - player.y)**2);
                if(d < minDist) { minDist = d; closest = b; }
            });
            if(closest) player.angle = Math.atan2(closest.y - player.y, closest.x - player.x);

            // إطلاق النار المستمر عند تفعيل اللمس
            if (controls.fire.active) {
                const now = Date.now();
                const config = weaponsConfig[player.weapon];
                if (now - player.lastShot >= config.fireRate) {
                    player.lastShot = now;
                    if(config.spread) {
                        for(let i=-1; i<=1; i++) bullets.push({ x: player.x, y: player.y, angle: player.angle + i*0.15, speed: config.speed, damage: config.damage, color: config.color, size: config.size, owner: 'player' });
                    } else {
                        bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: config.speed, damage: config.damage, color: config.color, size: config.size, owner: 'player' });
                    }
                }
            }

            // حركة البوتات وتصويبهم
            bots.forEach(bot => {
                let d = Math.sqrt((player.x - bot.x)**2 + (player.y - bot.y)**2);
                bot.angle = Math.atan2(player.y - bot.y, player.x - bot.x);

                if (botDifficulty === 'hard') {
                    moveEntity(bot, (player.x - bot.x)/d * bot.speed, (player.y - bot.y)/d * bot.speed);
                    if (d < 280 && Date.now() - bot.lastShot > 600) {
                        bullets.push({ x: bot.x, y: bot.y, angle: bot.angle, speed: 7, damage: 8, color: '#f43f5e', size: 3, owner: 'bot' });
                        bot.lastShot = Date.now();
                    }
                } else {
                    if(Math.random() < 0.02) { bot.vx = (Math.random()-0.5)*3; bot.vy = (Math.random()-0.5)*3; }
                    moveEntity(bot, bot.vx || 0, bot.vy || 0);
                    if (d < 180 && Math.random() < 0.02 && Date.now() - bot.lastShot > 1000) {
                        bullets.push({ x: bot.x, y: bot.y, angle: bot.angle, speed: 6, damage: 6, color: '#f43f5e', size: 3, owner: 'bot' });
                        bot.lastShot = Date.now();
                    }
                }
            });

            // تحديث الرصاص واكتشاف الاصطدام
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;

                let hit = false;
                for (let w of walls) {
                    if (b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) { hit = true; break; }
                }
                if (hit) { bullets.splice(i, 1); continue; }

                if (b.owner === 'bot' && Math.img && Math.sqrt((b.x - player.x)**2 + (b.y - player.y)**2) < player.r) {
                    player.hp -= b.damage; bullets.splice(i, 1);
                    if(player.hp <= 0) endGame(false);
                    continue;
                } else if (b.owner === 'bot' && Math.sqrt((b.x - player.x)**2 + (b.y - player.y)**2) < player.r) {
                    player.hp -= b.damage; bullets.splice(i, 1);
                    if(player.hp <= 0) endGame(false);
                    continue;
                }

                if (b.owner === 'player') {
                    for (let j = bots.length - 1; j >= 0; j--) {
                        if (Math.sqrt((b.x - bots[j].x)**2 + (b.y - bots[j].y)**2) < bots[j].r) {
                            bots[j].hp -= b.damage;
                            bullets.splice(i, 1);
                            if(bots[j].hp <= 0) { bots.splice(j, 1); if(bots.length === 0) endGame(true); }
                            break;
                        }
                    }
                }
            }
        }

        function moveEntity(e, vx, vy) {
            e.x += vx;
            for(let w of walls) { if(e.x+e.r > w.x && e.x-e.r < w.x+w.w && e.y+e.r > w.y && e.y-e.r < w.y+w.h) e.x -= vx; }
            e.y += vy;
            for(let w of walls) { if(e.x+e.r > w.x && e.x-e.r < w.x+w.w && e.y+e.r > w.y && e.y-e.r < w.y+w.h) e.y -= vy; }
        }

        function renderGameGraphics() {
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الجدران
            ctx.fillStyle = '#475569'; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            // رسم الرصاص
            bullets.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill(); });

            // رسم جندي اللاعب والبوتات
            drawCharacter(player);
            bots.forEach(drawCharacter);

            // رسم أزرار واجهة الموبايل (HUD والأزرار التفاعلية على الكانفاس مباشرة)
            drawCanvasUI();
        }

        function drawCharacter(c) {
            ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle);
            ctx.fillStyle = '#94a3b8'; ctx.fillRect(8, -2, 14, 4); // السلاح
            ctx.fillStyle = c.color; ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
            ctx.restore();

            // شريط الحياة
            ctx.fillStyle = '#ef4444'; ctx.fillRect(c.x - 15, c.y - 20, 30, 3);
            ctx.fillStyle = '#22c55e'; ctx.fillRect(c.x - 15, c.y - 20, 30 * (c.hp / c.maxHp), 3);
        }

        function drawCanvasUI() {
            // 1. رسم الـ Joystick (شمال)
            ctx.beginPath(); ctx.arc(controls.joy.x, controls.joy.y, controls.joy.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.07)'; ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 2; ctx.stroke();

            ctx.beginPath(); ctx.arc(controls.joy.knobX, controls.joy.knobY, controls.joy.knobR, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(239, 68, 68, 0.85)'; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.stroke();

            // 2. رسم زر إطلاق النار (يمين)
            ctx.beginPath(); ctx.arc(controls.fire.x, controls.fire.y, controls.fire.r, 0, Math.PI*2);
            ctx.fillStyle = controls.fire.active ? 'rgba(220, 38, 38, 0.9)' : 'rgba(185, 28, 28, 0.7)'; ctx.fill();
            ctx.strokeStyle = '#f87171'; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 13px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🔥 اضرب', controls.fire.x, controls.fire.y);

            // 3. زر علوي لتبديل السلاح (مستحيل يتداخل مع الجوستيك أو الضرب)
            ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
            ctx.fillRect(controls.weaponBtn.x, controls.weaponBtn.y, controls.weaponBtn.w, controls.weaponBtn.h);
            ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 1.5;
            ctx.strokeRect(controls.weaponBtn.x, controls.weaponBtn.y, controls.weaponBtn.w, controls.weaponBtn.h);
            
            ctx.fillStyle = '#fbbf24'; ctx.font = '900 11px system-ui'; ctx.fillText(weaponsConfig[player.weapon].name, canvas.width/2, 32);

            // 4. صحة اللاعب في الأعلى
            ctx.fillStyle = '#fff'; ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'left';
            ctx.fillText(`❤️ الصّحة: ${player.hp}`, 20, 30);
        }

        function endGame(win) {
            isGameRunning = false;
            alert(win ? '🔥 كفو! تم القضاء على الهدف بنجاح!' : '💀 انتهت اللعبة! قتلتك البوتات.');
            location.reload();
        }
    </script>
</body>
</html>
