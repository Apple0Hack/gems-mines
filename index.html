<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Mines - VIP Access</title>
    <style>
        :root { --main-blue: #00d4ff; --bg-dark: #001a2d; }
        body { background-color: var(--bg-dark); color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* شاشة الدخول */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: #0a4269; padding: 30px; border-radius: 20px; border: 2px solid var(--main-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); width: 80%; max-width: 300px; }
        .login-box h2 { color: var(--main-blue); margin-bottom: 20px; text-shadow: 0 0 10px var(--main-blue); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid var(--main-blue); background: #001a2d; color: white; text-align: center; font-size: 20px; box-sizing: border-box; }
        .login-box button { background: var(--main-blue); color: #001a2d; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* ستايل اللعبة */
        #gameContent { display: none; }
        .header { color: var(--main-blue); font-size: 28px; margin: 15px 0; text-shadow: 0 0 10px var(--main-blue); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 320px; margin: 0 auto; background: #0a4269; padding: 10px; border-radius: 12px; border: 3px solid var(--main-blue); box-shadow: 0 0 20px rgba(0,212,255,0.4); }
        .cell { width: 55px; height: 55px; background: #1a5a8a; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; transition: 0.2s; border: 1px solid var(--main-blue); }
        .cell.gem { background: linear-gradient(135deg, var(--main-blue), #005f73); }
        .cell.bomb { background: linear-gradient(135deg, #ff4d4d, #800000); border-color: #ff4d4d; }
        .status { margin-top: 15px; font-size: 18px; background: rgba(0,212,255,0.1); padding: 12px; border-radius: 10px; border: 1px dashed var(--main-blue); }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn { border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-undo { background: #ffc107; color: black; }
        .btn-reset { background: #dc3545; }
        .btn-new { background: #28a745; width: 85%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>GEMS MINES</h2>
            <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
            <button onclick="checkPass()">دخول اللعبة</button>
        </div>
    </div>

    <div id="gameContent">
        <div class="header">GEMS MINES - VIP</div>
        <div class="grid" id="grid"></div>
        <div class="status">
            💎 جواهر: <span id="score">0</span> | 💣 قنابل: <span id="bombs">0</span>
        </div>
        <div class="controls">
            <button class="btn btn-undo" onclick="undoMove()">↩ تراجع</button>
            <button class="btn btn-reset" onclick="resetCurrentRound()">🔄 إعادة الدور</button>
            <button class="btn btn-new" onclick="startNewGame()">🆕 لعبة جديدة (2 قنبلة)</button>
        </div>
    </div>

    <script>
        function checkPass() {
            const input = document.getElementById('passInput').value;
            if (input === "15711") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('gameContent').style.display = 'block';
                startNewGame();
            } else {
                alert("كلمة المرور خاطئة!");
            }
        }

        let score = 0;
        let bombsFound = 0;
        let bombPositions = [];
        let moveHistory = [];
        const gridElement = document.getElementById('grid');

        function startNewGame() {
            score = 0; bombsFound = 0; moveHistory = []; bombPositions = [];
            while(bombPositions.length < 2) {
                let r = Math.floor(Math.random() * 25);
                if(!bombPositions.includes(r)) bombPositions.push(r);
            }
            updateDisplay();
            createGrid();
        }

        function createGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => play(cell, i);
                gridElement.appendChild(cell);
            }
        }

        function play(cell, index) {
            if (cell.innerHTML !== '') return;
            let isBomb = bombPositions.includes(index);
            moveHistory.push({index: index, isBomb: isBomb});
            if (isBomb) {
                cell.classList.add('bomb'); cell.innerHTML = '💣'; bombsFound++;
            } else {
                cell.classList.add('gem'); cell.innerHTML = '💎'; score++;
            }
            updateDisplay();
        }

        function undoMove() {
            if (moveHistory.length === 0) return;
            let lastMove = moveHistory.pop();
            let cell = gridElement.children[lastMove.index];
            cell.innerHTML = ''; cell.className = 'cell';
            if (lastMove.isBomb) bombsFound--; else score--;
            updateDisplay();
        }

        function resetCurrentRound() {
            score = 0; bombsFound = 0; moveHistory = [];
            updateDisplay(); createGrid();
        }

        function updateDisplay() {
            document.getElementById('score').innerText = score;
            document.getElementById('bombs').innerText = bombsFound;
        }
    </script>
</body>
</html>
