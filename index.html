<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEMS MINES VIP</title>

<style>
:root {
    --gold: #ffd700;
    --electric-blue: #00d4ff;
    --bg-dark: #000c18;
    --vip-red: #ff3e3e;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg-dark);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    overflow: hidden;
}

/* شاشات التحكم في الظهور */
.screen-container {
    display: none; /* مخفي افتراضياً */
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.active {
    display: flex !important;
}

.main-title {
    font-size: 35px;
    color: var(--gold);
    margin-bottom: 40px;
}

.btn-group {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 250px;
}

button {
    padding: 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.btn-trial {
    background: transparent;
    border: 2px solid white;
    color: white;
}

.btn-vip {
    background: gold;
    color: black;
    font-weight: bold;
}

input {
    padding: 12px;
    margin: 10px;
    width: 220px;
    text-align: center;
    border-radius: 8px;
    border: 1px solid var(--electric-blue);
    background: #000;
    color: #fff;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 20px;
}

.cell {
    width: 55px;
    height: 55px;
    background: #1a5a8a;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    border-radius: 5px;
    font-size: 24px;
}

.gem { background: #00d4ff !important; }
.bomb { background: red !important; }

.submit-btn {
    background: var(--electric-blue);
    color: black;
    font-weight: bold;
    width: 100px;
}

</style>
</head>

<body>

<div id="landing" class="screen-container active">
    <div class="main-title">GEMS MINES VIP</div>
    <div class="btn-group">
        <button class="btn-trial" onclick="showTrial()">تجربة مجانية</button>
        <button class="btn-vip" onclick="showVIP()">VIP ACCESS</button>
    </div>
</div>

<div id="idScreen" class="screen-container">
    <h2 style="color:var(--electric-blue)">ادخل ID</h2>
    <input id="idInput" placeholder="أدخل الـ ID هنا">
    <button class="submit-btn" onclick="checkID()">استمرار</button>
</div>

<div id="passScreen" class="screen-container">
    <h2 style="color:var(--gold)">ادخل الباسورد</h2>
    <input id="passInput" type="password" placeholder="كلمة المرور">
    <button class="submit-btn" style="background:var(--gold)" onclick="checkPass()">دخول</button>
</div>

<div id="gameScreen" class="screen-container">
    <div class="main-title" style="font-size: 24px; margin-bottom: 10px;">VIP PLATFORM</div>
    <div id="grid" class="grid"></div>
    <p style="font-size: 20px; margin-top: 20px;">
        💎 <span id="score">0</span> | 💣 <span id="bombs">0</span>
    </p>
    <button onclick="location.reload()" style="background: #28a745; color: white; padding: 10px 20px;">لعبة جديدة 🔄</button>
</div>

<script>
// قائمة الـ IDs المسموحة
const allowedIDs = ["1658237633", "1002075", "10020025"];

// وظيفة التنقل بين الشاشات بأمان
function hideAll() {
    document.getElementById("landing").classList.remove("active");
    document.getElementById("idScreen").classList.remove("active");
    document.getElementById("passScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.remove("active");
}

function showTrial() {
    hideAll();
    document.getElementById("idScreen").classList.add("active");
}

function showVIP() {
    let pass = prompt("ادخل باسورد VIP الخاص بالدخول السريع:");
    if(pass === "102545") {
        hideAll();
        startGame();
    } else {
        alert("باسورد غلط");
    }
}

function checkID() {
    let id = document.getElementById("idInput").value.trim();

    if(!allowedIDs.includes(id)) {
        alert("ID غير صحيح");
        return;
    }

    if(localStorage.getItem("used_"+id)) {
        alert("الـ ID ده اتستخدم قبل كده!");
        return;
    }

    localStorage.setItem("currentID", id);
    hideAll();
    document.getElementById("passScreen").classList.add("active");
}

function checkPass() {
    let pass = document.getElementById("passInput").value;

    if(pass === "15711") {
        let id = localStorage.getItem("currentID");
        if(id) localStorage.setItem("used_"+id, "true");
        hideAll();
        startGame();
    } else {
        alert("باسورد غلط");
    }
}

// إعدادات اللعبة (القنابل في 0 و 3)
let bombs = [0,3];
let score = 0;
let bombCount = 0;

function startGame() {
    hideAll();
    document.getElementById("gameScreen").classList.add("active");

    let grid = document.getElementById("grid");
    grid.innerHTML = "";
    score = 0;
    bombCount = 0;
    document.getElementById("score").innerText = "0";
    document.getElementById("bombs").innerText = "0";

    for(let i=0; i<25; i++) {
        let cell = document.createElement("div");
        cell.className = "cell";

        cell.onclick = function() {
            if(cell.innerHTML !== "") return;

            if(bombs.includes(i)) {
                cell.innerHTML = "💣";
                cell.classList.add("bomb");
                bombCount++;
            } else {
                cell.innerHTML = "💎";
                cell.classList.add("gem");
                score++;
            }

            document.getElementById("score").innerText = score;
            document.getElementById("bombs").innerText = bombCount;
        }

        grid.appendChild(cell);
    }
}
</script>

</body>
</html>
