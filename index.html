<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 لعبة المزرعة السعيدة المطورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .farm-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), 
                              url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .blur-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="farm-bg min-h-screen text-gray-800 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 text-center max-w-sm w-full border-4 border-green-600">
            <div class="text-6xl mb-4">🔐</div>
            <h2 class="text-3xl font-bold text-green-700 mb-2">دخول آمن</h2>
            <p class="text-gray-500 mb-6 font-medium">يرجى إدخال كلمة المرور لفتح المزرعة</p>
            
            <input
                type="text"
                id="passwordInput"
                placeholder="PASSWORD"
                class="w-full p-4 mb-4 rounded-2xl border-2 border-gray-200 text-center text-xl font-bold text-green-700 outline-none focus:border-green-500 transition-all shadow-inner"
            />
            
            <button
                onclick="handleLogin()"
                class="w-full bg-green-600 hover:bg-green-700 text-white p-4 rounded-2xl text-xl font-bold shadow-lg active:scale-95 transition-all"
            >
                تأكيد الدخول
            </button>
        </div>
    </div>

    <div id="game-screen" class="hidden p-4 md:p-6">
        <div class="max-w-6xl mx-auto">
            
            <div class="bg-green-700/95 text-white rounded-3xl p-6 shadow-2xl mb-6 flex flex-col md:flex-row items-center justify-between border-2 border-white/20 gap-4">
                <div class="text-center md:text-right">
                    <h1 class="text-3xl font-bold flex items-center gap-2 justify-center md:justify-start">🌱 المزرعة السعيدة</h1>
                    <p class="text-sm opacity-90 mt-1">اضغط على المربعات الفارغة لتبدأ الزراعة والربح!</p>
                </div>
                <div class="bg-yellow-500 text-black px-6 py-3 rounded-2xl text-2xl font-black flex items-center gap-2 shadow-lg border border-yellow-300">
                    🪙 الذهب: <span id="gold-count">100</span>
                </div>
            </div>

            <div id="plots-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                </div>

        </div>
    </div>

    <div id="seed-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto shadow-2xl border-4 border-green-600">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-2xl font-bold text-green-700">اختر البذور لزراعتها 🌾</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 font-bold text-2xl">✕</button>
            </div>
            <div id="seeds-list" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        // قائمة المحاصيل الزراعية مع أسعارها ووقت نموها وأرباحها
        const cropsData = [
            { seed: '🌽', name: 'ذرة', cost: 10, reward: 20, time: 5 },     // تنمو في 5 ثواني
            { seed: '🥕', name: 'جزر', cost: 20, reward: 45, time: 10 },    // تنمو في 10 ثواني
            { seed: '🍅', name: 'طماطم', cost: 40, reward: 95, time: 20 },   // تنمو في 20 ثواني
            { seed: '🍓', name: 'فراولة', cost: 80, reward: 200, time: 40 }, // تنمو في 40 ثواني
            { seed: '🍉', name: 'بطيخ', cost: 150, reward: 400, time: 60 }   // تنمو في دقيقة
        ];

        // حالة اللعبة الافتراضية (12 قطعة أرض فارغة)
        let gold = 100;
        let selectedPlotId = null;
        let plots = Array.from({ length: 12 }, (_, i) => ({
            id: i + 1,
            status: 'empty', // حالتها: empty, growing, ready
            crop: null,
            timeLeft: 0,
            timerId: null
        }));

        // نظام التحقق من الأرقام لضمان الباسورد
        function fixNum(s) {
            return s.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d).toString()).trim();
        }

        function handleLogin() {
            const inputVal = document.getElementById('passwordInput').value;
            if (fixNum(inputVal) === '15711') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                updateUI();
                renderPlots();
            } else {
                alert('عذراً، كلمة المرور غير صحيحة! ❌');
            }
        }

        // تحديث شاشة عرض الذهب
        function updateUI() {
            document.getElementById('gold-count').innerText = gold;
        }

        // رندرة وبناء الأراضي
        function renderPlots() {
            const grid = document.getElementById('plots-grid');
            grid.innerHTML = '';

            plots.forEach(plot => {
                const card = document.createElement('div');
                card.className = "blur-panel rounded-3xl shadow-xl p-5 border-2 border-dashed border-green-700/30 text-center flex flex-col justify-between min-h-[200px] transition-all hover:scale-102";

                if (plot.status === 'empty') {
                    // أرض فارغة جاهزة للزراعة
                    card.innerHTML = `
                        <div class="text-5xl my-auto opacity-40">🟫</div>
                        <button onclick="openModal(${plot.id})" class="bg-green-600 hover:bg-green-700 text-white w-full py-2.5 rounded-2xl text-md font-bold shadow-md transition-all mt-2">
                            زراعة 🌱
                        </button>
                    `;
                } else if (plot.status === 'growing') {
                    // محصول في مرحلة النمو مع عداد تنازلي
                    card.innerHTML = `
                        <div class="text-5xl my-auto animate-pulse">🌱</div>
                        <div class="font-bold text-gray-700">${plot.crop.name} ينمو...</div>
                        <div class="bg-yellow-100 text-yellow-700 font-bold py-1.5 px-3 rounded-xl inline-block mt-2 text-sm">
                            ⏳ متبقي: ${plot.timeLeft} ثانية
                        </div>
                    `;
                } else if (plot.status === 'ready') {
                    // محصول ناضج جاهز للحصاد وجني الذهب
                    card.innerHTML = `
                        <div class="text-6xl my-auto select-none">${plot.crop.seed}</div>
                        <div class="font-black text-green-600 text-sm mb-1">جاهز للحصاد!</div>
                        <button onclick="harvestCrop(${plot.id})" class="bg-yellow-500 hover:bg-yellow-600 text-black w-full py-2.5 rounded-2xl text-lg font-black shadow-md transition-all animate-bounce">
                            حصاد 🌾 (+${plot.crop.reward})
                        </button>
                    `;
                }

                grid.appendChild(card);
            });
        }

        // فتح مودال اختيار البذور
        function openModal(plotId) {
            selectedPlotId = plotId;
            const modal = document.getElementById('seed-modal');
            const list = document.getElementById('seeds-list');
            list.innerHTML = '';

            cropsData.forEach(crop => {
                const canAfford = gold >= crop.cost;
                const row = document.createElement('div');
                row.className = `flex items-center justify-between p-3 rounded-2xl border-2 transition-all ${canAfford ? 'bg-green-50 border-green-200 hover:border-green-500' : 'bg-gray-50 border-gray-200 opacity-60'}`;
                
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-4xl">${crop.seed}</span>
                        <div class="text-right">
                            <p class="font-bold text-gray-800 text-lg">${crop.name}</p>
                            <p class="text-xs text-gray-500">الوقت: ${crop.time}ث | الربح: 🪙${crop.reward}</p>
                        </div>
                    </div>
                    <button onclick="${canAfford ? `plantCrop('${crop.name}')` : ''}" 
                            class="px-4 py-2 rounded-xl text-sm font-bold shadow-sm ${canAfford ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}">
                        شراء 🪙${crop.cost}
                    </button>
                `;
                list.appendChild(row);
            });

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('seed-modal').classList.add('hidden');
        }

        // بدء عملية الزراعة وتشغيل العداد الزمني التنازلي
        function plantCrop(cropName) {
            const crop = cropsData.find(c => c.name === cropName);
            const plot = plots.find(p => p.id === selectedPlotId);

            if (gold >= crop.cost && plot && plot.status === 'empty') {
                gold -= crop.cost;
                updateUI();

                plot.status = 'growing';
                plot.crop = crop;
                plot.timeLeft = crop.time;

                closeModal();
                renderPlots();

                // بدء التوقيت الفعلي للقطعة (كل ثانية ينقص العداد)
                plot.timerId = setInterval(() => {
                    plot.timeLeft--;
                    if (plot.timeLeft <= 0) {
                        clearInterval(plot.timerId);
                        plot.status = 'ready';
                    }
                    renderPlots();
                }, 1000);
            }
        }

        // عملية الحصاد وإضافة الذهب للرصيد
        function harvestCrop(plotId) {
            const plot = plots.find(p => p.id === plotId);
            if (plot && plot.status === 'ready') {
                gold += plot.crop.reward;
                updateUI();

                // إعادة الأرض فارغة من جديد
                plot.status = 'empty';
                plot.crop = null;
                plot.timeLeft = 0;
                plot.timerId = null;

                renderPlots();
            }
        }
    </script>
</body>
</html>
