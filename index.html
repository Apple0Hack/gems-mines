<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MINES VIP - ELITE EDITION</title>
    <style>
        :root { --gold: #ffd700; --blue: #00d4ff; --neon-shadow: 0 0 15px rgba(255, 215, 0, 0.7); }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* خلفية متحركة */
        body::before { content: ""; position: absolute; width: 200%; height: 200%; background: linear-gradient(45deg, #000 25%, #001a33 50%, #000 75%); animation: bgMove 10s linear infinite; z-index: -1; }
        @keyframes bgMove { 0% { transform: translate(-25%, -25%); } 100% { transform: translate(0, 0); } }

        /* شريط الإشارة الاحترافي */
        .status-bar { position: absolute; top: 0; width: 100%; background: rgba(0, 212, 255, 0.1); border-bottom: 1px solid var(--blue); padding: 5px 0; overflow: hidden; white-space: nowrap; z-index: 10; }
        .status-text { display: inline-block; animation: scrollText 15s linear infinite; color: var(--blue); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { background: rgba(0, 15, 30, 0.95); border: 2px solid var(--gold); padding: 40px 25px; border-radius: 30px; text-align: center; width: 340px; box-shadow: var(--neon-shadow), inset 0 0 20px rgba(0, 212, 255, 0.2); position: relative; backdrop-filter: blur(10px); }

        /* تأثير النيون العلوي */
        .neon-line { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 150px; height: 4px; background: var(--gold); box-shadow: 0 0 20px var(--gold); border-radius: 10px; }

        .title { font-size: 28px; color: var(--gold); margin-bottom: 30px; font-weight: 900; text-shadow: 0 0 20px var(--gold); letter-spacing: 2px; }

        /* أزرار 3D مطورة */
        .btn-3d { width: 100%; padding: 16px; margin: 15px 0; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s; position: relative; text-transform: uppercase; }
        .btn-gold { background: linear-gradient(145deg, #ffd700, #b8860b); color: #000; box-shadow: 0 8px 0 #8a6d00, 0 15px 25px rgba(0,0,0,0.5); }
        .btn-gold:active { transform: translateY(6px); box-shadow: 0 2px 0 #8a6d00; }
        
        .btn-outline { background: #000; color: var(--blue); border: 1px solid var(--blue); box-shadow: 0 0 10px var(--blue); }
        .btn-outline:active { transform: scale(0.98); box-shadow: 0 0 5px var(--blue); }

        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #1a3a5a; background: rgba(0,0,0,0.6); color: var(--blue); text-align: center; font-size: 20px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); outline: none; }

        /* شبكة الرادار */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; border: 1px solid rgba(0, 212, 255, 0.3); }
        .cell { width: 50px; height: 50px; background: #0a1a2a; border: 1px solid #1a3a5a; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.3s; }
        .active-scan { animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { background: #0a1a2a; } to { background: #1a3a5a; } }

        .attempts-box { background: rgba(0, 212, 255, 0.05); padding: 12px; border-radius: 15px; border: 1px solid var(--blue); margin-top: 15px; font-size: 14px; color: var(--blue); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-text">
            CONNECTED TO SERVER-V3... ENCRYPTING DATA... STATUS: SECURE... SCANNING MINES... BYPASSING FIREWALL... READY TO EXTRACT GEMS...
        </div>
    </div>

    <div id="screen-pass" class="container">
        <div class="neon-line"></div>
        <div class="title">SECURITY ACCESS</div>
        <input type="password" id="mainKey" placeholder="ENTER ACCESS CODE">
        <button class="btn-3d btn-gold" onclick="login()">AUTHORIZE LOGIN</button>
    </div>

    <div id="screen-id" class="container hidden">
        <div class="neon-line"></div>
        <div class="title">USER IDENTITY</div>
        <input type="text" id="pID" placeholder="ENTER PLAYER ID">
        <button class="btn-3d btn-gold" onclick="checkID()">CONNECT TO SERVER</button>
    </div>

    <div id="screen-game" class="container hidden">
        <div class="neon-line"></div>
        <div class="title">RADAR V3.2</div>
        <div class="grid" id="gameGrid"></div>
        <div class="attempts-box">
            MONTHLY ATTEMPTS REMAINING: <span id="tries" style="color:var(--gold)">3</span>
        </div>
        <button id="rescanBtn" class="btn-3d btn-outline" onclick="rescan()">RE-SCAN GRID</button>
        <p style="font-size: 12px; margin-top: 10px;">💎 DETECTED | 💣 BYPASSED</p>
    </div>

    <script>
        const allowedIDs = ["1658237633", "1002075"];
        let tries = localStorage.getItem('monthlyTries') ? parseInt(localStorage.getItem('monthlyTries')) : 3;

        function login() {
            if(document.getElementById('mainKey').value === "15711") {
                hideAll(); document.getElementById('screen-id').classList.remove('hidden');
            } else alert("INVALID ACCESS CODE!");
        }

        function checkID() {
            if(allowedIDs.includes(document.getElementById('pID').value)) {
                hideAll(); document.getElementById('screen-game').classList.remove('hidden');
                updateDisplay(); renderGrid();
            } else alert("ID NOT AUTHORIZED!");
        }

        function hideAll() { document.querySelectorAll('.container').forEach(c => c.classList.add('hidden')); }

        function renderGrid() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = "";
            const bombs = [0, 3]; 
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell active-scan';
                cell.onclick = () => {
                    if(cell.innerHTML !== "") return;
                    if(bombs.includes(i)) {
                        cell.innerHTML = "💣"; cell.style.background = "rgba(255,0,0,0.3)";
                    } else {
                        cell.innerHTML = "💎"; cell.style.background = "rgba(0,212,255,0.3)";
                        cell.style.boxShadow = "0 0 10px var(--blue)";
                    }
                };
                grid.appendChild(cell);
            }
        }

        function updateDisplay() {
            document.getElementById('tries').innerText = tries;
            if(tries <= 0) {
                document.getElementById('rescanBtn').disabled = true;
                document.getElementById('rescanBtn').innerText = "LIMIT REACHED";
            }
        }

        function rescan() {
            if(tries > 0) {
                tries--;
                localStorage.setItem('monthlyTries', tries);
                updateDisplay();
                renderGrid();
            }
        }
    </script>
</body>
</html>
